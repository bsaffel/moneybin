<!-- @dsCard group="Shape" viewport="700x150" subtitle="Radii stay small — softness is not this brand's register" name="Radii" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-data);font-size:10px}</style></head>
<body style="background:var(--bg-base);padding:16px;display:flex;gap:24px;align-items:flex-end;justify-content:center;">
<div style="text-align:center;color:var(--text-secondary)"><div style="width:80px;height:56px;border:1px solid var(--border-strong);border-radius:var(--r-chip);background:var(--bg-raised)"></div><br>r-chip 2px<br>chips, tags</div>
<div style="text-align:center;color:var(--text-secondary)"><div style="width:80px;height:56px;border:1px solid var(--border-strong);border-radius:var(--r-control);background:var(--bg-raised)"></div><br>r-control 4px<br>buttons, inputs</div>
<div style="text-align:center;color:var(--text-secondary)"><div style="width:80px;height:56px;border:1px solid var(--border-strong);border-radius:var(--r-card);background:var(--bg-raised)"></div><br>r-card 6px<br>widgets</div>
<div style="text-align:center;color:var(--text-secondary)"><div style="width:80px;height:56px;border:1px solid var(--border-strong);border-radius:var(--r-modal);background:var(--bg-raised)"></div><br>r-modal 10px<br>modals</div>
</body></html>
