<!-- @dsCard group="Shape" viewport="700x160" subtitle="4px base grid. Hairline borders carry structure — no shadows on resting surfaces." name="Spacing & borders" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-data);font-size:10.5px;color:var(--text-secondary)}</style></head>
<body style="background:var(--bg-base);padding:16px 24px;display:flex;gap:40px;">
<div style="display:grid;gap:8px;align-content:start;">
<div style="display:flex;align-items:center;gap:10px;"><span style="width:8px;height:12px;background:var(--accent-gilt)"></span>8 — inside controls</div>
<div style="display:flex;align-items:center;gap:10px;"><span style="width:12px;height:12px;background:var(--accent-gilt)"></span>12 — related elements</div>
<div style="display:flex;align-items:center;gap:10px;"><span style="width:16px;height:12px;background:var(--accent-gilt)"></span>16 — widget padding</div>
<div style="display:flex;align-items:center;gap:10px;"><span style="width:24px;height:12px;background:var(--accent-gilt)"></span>24 — between widgets</div>
<div style="display:flex;align-items:center;gap:10px;"><span style="width:28px;height:12px;background:var(--accent-gilt)"></span>28 — page gutters</div>
</div>
<div style="flex:1;align-self:center;">
<div style="background:var(--bg-surface);border:1px solid var(--border-hairline);border-radius:var(--r-card);padding:14px 16px;color:var(--text-primary);font-family:var(--font-ui);font-size:13px;">Resting card: 1px hairline, no shadow.</div>
<div style="margin-top:10px;">shadow-floating reserved for popovers/menus/tooltips only</div>
</div>
</body></html>
