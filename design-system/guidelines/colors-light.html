<!-- @dsCard group="Colors" viewport="700x150" subtitle="Light theme — peer mapping, not an inversion" name="Light surfaces & text" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-data);font-size:10px}</style></head>
<body data-theme="light" style="background:var(--bg-base);padding:16px;display:flex;gap:10px;align-items:flex-start;">
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--bg-base);border:1px solid var(--border-strong)"></div>bg-base<br>#F6F4EF</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--bg-surface);border:1px solid var(--border-strong)"></div>bg-surface<br>#FDFCF9</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--bg-raised);border:1px solid var(--border-strong)"></div>bg-raised<br>#FFFFFF</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--bg-inset);border:1px solid var(--border-strong)"></div>bg-inset<br>#EFECE4</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--border-hairline)"></div>hairline<br>#E3DFD5</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--text-primary)"></div>text-primary<br>#1C1A16</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--text-secondary)"></div>text-secondary<br>#5C564C</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--text-faint)"></div>text-faint<br>#8B8477</div>
</body></html>
