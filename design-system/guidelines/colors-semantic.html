<!-- @dsCard group="Colors" viewport="700x150" subtitle="Sign is never color alone: explicit +/− and ▲/▼. Accounting convention: negative = expense." name="Income / expense semantics" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-data)}</style></head>
<body style="background:var(--bg-base);padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;">
<div style="display:flex;justify-content:space-between;border:1px solid var(--border-hairline);border-radius:var(--r-control);padding:10px 14px;background:var(--bg-surface);">
  <span style="font-family:var(--font-ui);font-size:13px;color:var(--text-primary)">Payroll — Meridian Labs</span>
  <span style="font-size:13px;color:var(--pos-income)">+$6,240.00 ▲</span></div>
<div style="display:flex;justify-content:space-between;border:1px solid var(--border-hairline);border-radius:var(--r-control);padding:10px 14px;background:var(--bg-surface);">
  <span style="font-family:var(--font-ui);font-size:13px;color:var(--text-primary)">Delta Air Lines</span>
  <span style="font-size:13px;color:var(--neg-expense)">−$428.60 ▼</span></div>
<div style="font-size:10px;color:var(--text-faint)">pos-income #45B27B dark / #157A52 light</div>
<div style="font-size:10px;color:var(--text-faint)">neg-expense #E0684F dark / #B03A24 light · transfers stay text-secondary with ⇄</div>
</body></html>
