<!-- @dsCard group="Colors" viewport="700x150" subtitle="Dark theme (reference) — surfaces, borders, text" name="Dark surfaces & text" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-data);font-size:10px}</style></head>
<body style="background:var(--bg-base);padding:16px;display:flex;gap:10px;align-items:flex-start;">
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--bg-base);border:1px solid var(--border-strong)"></div>bg-base<br>#141311</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--bg-surface);border:1px solid var(--border-strong)"></div>bg-surface<br>#1B1916</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--bg-raised);border:1px solid var(--border-strong)"></div>bg-raised<br>#22201C</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--bg-inset);border:1px solid var(--border-strong)"></div>bg-inset<br>#100F0D</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--border-hairline)"></div>hairline<br>#2A2723</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--text-primary)"></div>text-primary<br>#E9E4DB</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--text-secondary)"></div>text-secondary<br>#A39C90</div>
<div style="flex:1;text-align:center;color:var(--text-secondary)"><div style="height:64px;border-radius:4px;background:var(--text-faint)"></div>text-faint<br>#6E685E</div>
</body></html>
