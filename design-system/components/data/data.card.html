<!-- @dsCard group="Components" viewport="700x330" subtitle="Amount semantics & sizes · WidgetCard with SQL provenance" name="Data" -->
<!DOCTYPE html><html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg-base)}</style>
</head><body><div id="root"></div>
<script type="text/babel">
const NS = Object.keys(window).map(k => { try { return window[k]; } catch (e) { return null; } })
  .find(v => v && typeof v === 'object' && v.Amount && v.WidgetCard) || {};
const { Amount, WidgetCard } = NS;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{padding:'16px 20px',display:'flex',flexDirection:'column',gap:14}}>
    <div style={{display:'flex',gap:24,alignItems:'baseline'}}>
      <Amount value={6240} arrow />
      <Amount value={-428.6} arrow />
      <Amount value={-2000} kind="neutral" />
      <Amount value={487231.09} kind="plain" size="hero" auditable style={{fontSize:'28px'}} />
    </div>
    <WidgetCard title="SPEND BY CATEGORY" meta="June 2026"
      sql={"SELECT category, sum(amount) FROM txns\nWHERE month = '2026-06' GROUP BY 1 ORDER BY 2;"}>
      <div style={{display:'grid',gridTemplateColumns:'90px 1fr 80px',alignItems:'center',gap:12,fontFamily:'var(--font-ui)',fontSize:13,color:'var(--text-primary)'}}>
        <span>Housing</span><div style={{height:12,background:'var(--bg-inset)',borderRadius:2}}><div style={{width:'100%',height:'100%',background:'var(--chart-1)',borderRadius:2}}></div></div><span style={{textAlign:'right'}}><Amount value={-2850} /></span>
        <span>Travel</span><div style={{height:12,background:'var(--bg-inset)',borderRadius:2}}><div style={{width:'42%',height:'100%',background:'var(--chart-2)',borderRadius:2}}></div></div><span style={{textAlign:'right'}}><Amount value={-1204} /></span>
      </div>
    </WidgetCard>
    <div style={{fontFamily:'var(--font-data)',fontSize:10,color:'var(--text-faint)'}}>click SQL to reveal the provenance panel</div>
  </div>
);
</script></body></html>
