<!DOCTYPE html><html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg-base)}</style>
</head><body><div id="root"></div>
<script type="text/babel">
const NS = Object.keys(window).map(k => { try { return window[k]; } catch (e) { return null; } })
  .find(v => v && typeof v === 'object' && v.Mark && v.DuckKey) || {};
const { Mark, DuckKey } = NS;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{padding:'20px 24px',display:'flex',gap:32,alignItems:'center'}}>
    <Mark size={48} plate="light" />
    <span style={{background:'#F6F4EF',borderRadius:8,padding:10,display:'inline-flex'}}><Mark size={48} plate="dark" /></span>
    <span style={{width:1,height:48,background:'var(--border-hairline)'}}></span>
    <DuckKey size={40} />
    <DuckKey size={40} color="var(--text-secondary)" />
    <DuckKey size={40} variant="full" />
  </div>
);
</script></body></html>
