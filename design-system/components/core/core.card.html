<!DOCTYPE html><html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg-base)}</style>
</head><body><div id="root"></div>
<script type="text/babel">
const NS = Object.keys(window).map(k => { try { return window[k]; } catch (e) { return null; } })
  .find(v => v && typeof v === 'object' && v.Button && v.Chip) || {};
const { Button, Chip } = NS;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{padding:'18px 24px',display:'flex',flexDirection:'column',gap:16}}>
    <div style={{display:'flex',gap:12,alignItems:'center'}}>
      <Button variant="primary">Add widget</Button>
      <Button variant="secondary">Export CSV</Button>
      <Button variant="ghost">View all →</Button>
      <Button variant="primary" disabled>Add widget</Button>
      <Button variant="secondary" size="sm">Small</Button>
    </div>
    <div style={{display:'flex',gap:12,alignItems:'center'}}>
      <Chip>Groceries</Chip>
      <Chip>Travel</Chip>
      <Chip>Transfer ⇄</Chip>
      <Chip variant="sql" />
      <Chip variant="sql" active />
      <Chip variant="meta">synced 4 min ago</Chip>
      <Chip variant="meta">⌘K</Chip>
    </div>
  </div>
);
</script></body></html>
