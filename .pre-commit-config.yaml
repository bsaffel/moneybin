repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff
        language: system
        types: [python]
        args: [check, --fix]
        require_serial: false
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff
        language: system
        # python + markdown: with `preview = true` ruff formats Python code
        # blocks inside .md too, and CI runs `ruff format --check .` over both.
        # A python-only scope here let an unformatted markdown code block slip
        # past pre-commit and fail CI. (`ruff check` is a no-op on .md, so the
        # check hook above stays python-only.)
        types_or: [python, markdown]
        args: [format]
        require_serial: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: '\.(png|jpg|jpeg|gif|ico|svg)$'
      - id: check-merge-conflict
      - id: debug-statements
