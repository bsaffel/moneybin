# Real-world Chase credit-card shape (F10 close-out). The layout every synthetic
# fixture failed to reproduce, so the suite passed while every real statement
# seeded: a column header WRAPPED across two physical lines ("Date of" /
# "Transaction  Merchant ...  $ Amount"), section sub-headers interleaved among
# the rows, and MM/DD dates whose year lives only on the "Opening/Closing Date"
# line (a cycle crossing year-end). Generated by _make_fixture.py.
file: chase_card_unruled.pdf
expected_outcome: transactions
expected_metadata:
  account_id: "4387"
  period_start: "2024-12-23"
  period_end: "2025-01-22"
  opening_balance: "100.00"
  closing_balance: "120.00"
expected_format:
  institution_name: Chase
  document_kind: transactions
  front_end: pdfplumber
  routing: transactions
sign_convention: negative_is_income
# Reconciliation is computed on the AS-PRINTED amounts, before the card sign flip:
#   -50.00 + 25.00 + 40.00 + 5.00 = 20.00 = closing 120.00 - opening 100.00
expected_reconciliation:
  passed: true
  observed_delta: "20.00"
  expected_delta: "20.00"
# `amount` is the value STORED in raw.tabular_transactions. The card convention
# (negative_is_income) flips each printed sign: the payment -50.00 becomes +50.00
# (income), and the +25/+40/+5 charges become -25/-40/-5 (expense). `date` carries
# the year INFERRED from the 12/23/24-01/22/25 cycle: 12/xx -> 2024, 01/xx -> 2025.
expected_transactions:
  - date: "2024-12-26"
    description: "PAYMENT THANK YOU"
    amount_as_printed: "-50.00"
    amount: "50.00"
  - date: "2024-12-28"
    description: "COFFEE SHOP"
    amount_as_printed: "25.00"
    amount: "-25.00"
  - date: "2025-01-05"
    description: "BOOKSTORE"
    amount_as_printed: "40.00"
    amount: "-40.00"
  - date: "2025-01-20"
    description: "PURCHASE INTEREST CHARGE"
    amount_as_printed: "5.00"
    amount: "-5.00"
