scenario: family-full-pipeline
description: "End-to-end correctness for the family persona"

setup:
  persona: family
  seed: 42
  years: 3
  fixtures: []

# Trailing `transform` is intentional — see basic-full-pipeline.yaml for the
# full explanation. Categories live in `app.transaction_categories`; the
# fct_transactions SQLMesh model LEFT JOINs that table, so a second transform
# is required to surface assigned categories for the accuracy evaluation.
pipeline:
  - generate
  - transform
  - match
  - seed_merchants
  - categorize
  - transform

assertions:
  - name: fk_account_id
    fn: assert_valid_foreign_keys
    args:
      child: core.fct_transactions
      column: account_id
      parent: core.dim_accounts
      parent_column: account_id
  - name: sign_convention
    fn: assert_sign_convention
  - name: no_duplicate_gold_records
    fn: assert_no_duplicates
    args:
      table: core.fct_transactions
      columns: [transaction_id]
  # Row count is asserted in pytest using the deterministic GeneratorEngine
  # output (see tests/scenarios/test_family_full_pipeline.py). The previous
  # ±15% tolerance band was an observe-and-paste expectation; replacing it
  # with the generator-derived exact count is required by
  # .claude/rules/testing.md ("Scenario Expectations Must Be Independently
  # Derived").
  - name: transfers_balance_to_zero
    fn: assert_balanced_transfers

evaluations:
  - name: categorization_accuracy
    fn: score_categorization
    threshold:
      metric: accuracy
      min: 0.80
  - name: transfer_f1
    fn: score_transfer_detection
    threshold:
      metric: f1
      min: 0.85

gates:
  required_assertions: all
  required_evaluations: all
