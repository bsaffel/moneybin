scenario: dedup-negative-fixture
description: "Adversarial near-miss rows MUST NOT collapse"

setup:
  persona: family
  seed: 42
  years: 1
  fixtures:
    - path: dedup-negative/distinct_csv.csv
      account: amazon-card
      source_type: csv
    - path: dedup-negative/distinct_ofx.csv
      account: amazon-card
      source_type: ofx

pipeline:
  - load_fixtures
  - transform
  - match

assertions:
  - name: row_count_no_collapse
    fn: assert_row_count_exact
    args:
      table: core.fct_transactions
      # Hand-counted: 2 CSV rows + 2 OFX rows, none should collapse.
      expected: 4

expectations:
  - kind: match_decision
    description: "WHOLE FOODS 04-10 vs AMAZON 04-10 must NOT match (different merchants)"
    transactions:
      - source_transaction_id: NEG_CSV_2024-04-10_WF_32.45
        source_type: csv
      - source_transaction_id: NEG_OFX_2024-04-10_AMZN
        source_type: ofx
    expected: not_matched
  - kind: match_decision
    description: "TJ 04-10 vs TJ 04-11 must NOT match (same merchant, different days)"
    transactions:
      - source_transaction_id: NEG_CSV_2024-04-10_TJ_28.10
        source_type: csv
      - source_transaction_id: NEG_OFX_2024-04-11_TJ
        source_type: ofx
    expected: not_matched

# NOTE: a former third case (STARBUCKS csv vs DUNKIN ofx — different merchants,
# same account/amount/day) was removed when exact-key auto-merge landed
# (2026-06-13). A *lone* exact-key cross-source pair is indistinguishable from a
# true cross-format duplicate and now auto-merges by design (accepted precision
# tradeoff). The realistic version of that precision concern — both merchants
# present in BOTH formats (4 rows) — is guarded 1:1 and lives in the
# `dedup-overmerge-guard` scenario.

gates:
  required_assertions: all
  required_expectations: all
