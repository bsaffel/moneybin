scenario: transfer-detection-cross-account
description: "Confirm transfer pairs across accounts; F1 vs ground truth + balanced legs"

setup:
  persona: family
  seed: 42
  years: 2
  fixtures: []

pipeline:
  - generate
  - transform
  - match

assertions:
  - name: balanced_transfers
    fn: assert_balanced_transfers
  - name: sign_convention
    fn: assert_sign_convention

expectations:
  # Binary all-or-nothing companion to the F1 evaluation below: every
  # labeled transfer pair must round-trip into a single transfer_pair_id
  # in core.fct_transactions. F1 catches degradation; this catches loss
  # of any single labeled pair.
  - kind: transfers_match_ground_truth
    description: "Every synthetic transfer pair lands as a single transfer_pair_id"

evaluations:
  - name: transfer_f1
    fn: score_transfer_detection
    threshold:
      metric: f1
      min: 0.85

gates:
  required_assertions: all
  required_evaluations: all
  required_expectations: all
