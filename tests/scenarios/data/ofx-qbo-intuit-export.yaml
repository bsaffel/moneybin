scenario: ofx-qbo-intuit-export
description: "QBO file from a QuickBooks/Intuit export — extension routing + parse"

setup:
  persona: basic
  seed: 42
  years: 1
  fixtures: []
  imports:
    - path: ofx/qbo_intuit_sample.qbo
      apply_transforms: false

pipeline:
  - import_file
  - transform

# Fixture has 1 BANKACCTFROM with 2 STMTTRN entries; <FI><ORG>INTUIT</ORG>.
assertions:
  - name: ofx_transactions_row_count
    fn: assert_row_count_exact
    args:
      table: raw.ofx_transactions
      expected: 2
  - name: ofx_accounts_row_count
    fn: assert_row_count_exact
    args:
      table: raw.ofx_accounts
      expected: 1
  - name: import_log_single_batch
    fn: assert_row_count_exact
    args:
      table: raw.import_log
      expected: 1
  - name: source_system_populated
    fn: assert_source_system_populated
    args:
      table: core.fct_transactions
      expected_sources: [ofx]

gates:
  required_assertions: all
  required_evaluations: all
  required_expectations: all
