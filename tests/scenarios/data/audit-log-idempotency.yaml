scenario: audit-log-idempotency
description: >
  Replaying a fixed sequence of curation operations (edit note → add
  tags → set splits) yields byte-identical final state on the user-state
  tables. The audit log records only real mutations: an idempotent
  re-apply (re-adding an existing tag) performs no row change and emits
  no audit row (REC-PR3 DN2 — repos audit real mutations only). So the
  second run emits fewer events than the first, by exactly the number of
  ops that became no-ops on replay (the two tag re-adds). This guards
  against audit drift: emitting a duplicate state-changing event when the
  underlying row did not change.

setup:
  persona: basic
  seed: 42
  years: 1
  fixtures: []

pipeline: []
assertions: []
gates:
  required_assertions: all
