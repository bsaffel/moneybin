scenario: encryption-key-propagation
description: "Subprocess transform must open the encrypted DB and produce expected rows"

setup:
  persona: basic
  seed: 42
  years: 1
  fixtures: []

# The mutation lives in the pipeline; assertions stay read-only. If
# `transform_via_subprocess` succeeds and the rows below are present, the
# child process opened the encrypted DB with the propagated key — no
# special encryption-propagation assertion is needed.
pipeline:
  - generate
  - transform_via_subprocess

assertions:
  # Row-count parity with the deterministic generator is asserted in pytest
  # (see tests/scenarios/test_encryption_key_propagation.py). The previous
  # `min_rows ≥ 100` band was an observe-and-paste expectation.
  - name: no_unencrypted_artifacts
    fn: assert_no_unencrypted_db_files
    args:
      tmpdir: from_runtime

gates:
  required_assertions: all
