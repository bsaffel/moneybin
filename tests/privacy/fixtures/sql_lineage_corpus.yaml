# SQL lineage resolver corpus: ≥50 entries covering all edge-case categories.
#
# Each entry is verified against the real resolver output. Do NOT change
# expected_* values to match incorrect resolver output — if a case breaks,
# investigate the resolver. "conservative fallback" entries are noted with
# "falls back to max input tier" in the description.
#
# DataClass values (StrEnum): aggregate, account_identifier, routing_number,
# institution_account_number, balance, txn_amount, income_amount, merchant_name,
# description, user_note, txn_date, category, institution, currency, txn_type,
# record_id, timestamp_observability
#
# Tier names: low, medium, high, critical

# ---------------------------------------------------------------------------
# Direct columns — fct_transactions
# ---------------------------------------------------------------------------

