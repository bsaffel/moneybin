name: Scenarios

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: scenarios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-scenarios:
    name: Run Scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run scenario suite
        env:
          # GitHub Actions runners have no keyring backend; SecretStore
          # falls through to this env var for the encryption key. The
          # value is ephemeral — the runner is destroyed after each job.
          MONEYBIN_DATABASE__ENCRYPTION_KEY: ci-ephemeral-key-runner-destroyed-after-job
        run: |
          set -o pipefail
          start=$(date +%s)
          uv run moneybin synthetic verify --all --output=json | tee scenarios.jsonl
          end=$(date +%s)
          echo "Total scenarios duration: $((end - start))s"

      - name: Per-scenario summary
        if: always()
        run: |
          echo "## Scenario results" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.data | "- \(.scenario): \(if .passed then "PASS" else "FAIL" end) (\(.duration_seconds)s)"' \
            scenarios.jsonl >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenarios-results
          path: scenarios.jsonl
