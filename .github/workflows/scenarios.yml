name: Scenarios

on:
  workflow_call:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: scenarios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-scenarios:
    name: Run Scenarios (shard ${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 2-way pytest-split shard (count-based; ~70 scenarios -> 35/35) so the
    # scenario suite drops from ~5 min to ~3 min. Mirrors the ci.yml shards.
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run scenario suite
        env:
          # GitHub Actions runners have no keyring backend; SecretStore
          # falls through to this env var for the encryption key. The
          # value is ephemeral — the runner is destroyed after each job.
          MONEYBIN_DATABASE__ENCRYPTION_KEY: ci-ephemeral-key-runner-destroyed-after-job
        run: |
          set -o pipefail
          uv run pytest tests/ -m scenarios -v \
            --splits ${{ strategy.job-total }} --group ${{ matrix.group }} \
            --json-report --json-report-file=scenarios-${{ matrix.group }}.json \
            --durations=25

      - name: Per-scenario summary
        if: always()
        run: |
          echo "## Scenario results (shard ${{ matrix.group }})" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.tests[] | "- \(.nodeid | split("::") | last): \(.outcome | ascii_upcase) (\(((.setup.duration // 0) + (.call.duration // 0) + (.teardown.duration // 0)) | floor)s)"' \
            scenarios-${{ matrix.group }}.json >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scenarios-results-${{ matrix.group }}
          path: scenarios-${{ matrix.group }}.json
