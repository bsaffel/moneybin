name: Security

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Audit dependencies for CVEs
        # CVE-2026-3219 (GHSA-58qw-9mgm-455v): pip archive-type confusion.
        # No fix version yet; pip is a dev/build tool, not invoked at runtime.
        # Re-evaluate when upstream releases a fix.
        run: uv run pip-audit --skip-editable --ignore-vuln CVE-2026-3219
