name: AI Code Review

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    name: Claude Review
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Automated PR review
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Bash,Read,Grep,Glob"
          prompt: |
            Review this pull request for code quality, correctness, security, and adherence to
            project conventions (see CLAUDE.md and .claude/rules/). Focus on:
            - Bugs or logic errors
            - Security issues (SQL injection, path traversal, hardcoded secrets)
            - Violations of project standards (type hints, docstrings, error handling, sign conventions)
            - Test coverage gaps for new business logic
            Post inline comments on specific lines where relevant. Summarize findings as a PR comment.

            After completing your review, resolve any previously-posted review threads whose
            issues are now fixed in the current code. Use the gh CLI and environment variables
            already present in the runner — do not interpolate untrusted event payload fields
            into shell commands. Steps:
            1. Determine the PR number: gh pr view --json number -q .number
            2. Parse owner and repo from the GITHUB_REPOSITORY environment variable.
            3. Fetch open threads via gh api graphql, passing owner, repo, and number as
               -f variables so no user-controlled data is shell-interpolated.
            4. For each unresolved thread, read its comment body, check whether the current
               code addresses the issue, and if so resolve it via the resolveReviewThread
               GraphQL mutation.
            Only resolve threads where the fix is clearly present — leave threads open if
            the issue is partially addressed or still present.

            After resolving threads, if your review found no new issues and all previously-raised
            threads are now resolved, submit an approval: gh pr review --approve --body "All issues resolved."
            If any threads remain open or you found new issues, do not approve.

      - name: Interactive @claude mentions
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Bash,Read,Grep,Glob"
          prompt: |
            Respond to the @claude mention in the PR comment. If the request is
            a re-review (or otherwise asks you to re-evaluate the PR), inspect
            the current code against previously-raised review threads and any
            new concerns, using project conventions in CLAUDE.md and
            .claude/rules/.

            Resolve any previously-posted review threads whose issues are now
            fixed in the current code. Use the gh CLI and environment variables
            already present in the runner — do not interpolate untrusted event
            payload fields into shell commands. Steps:
            1. Determine the PR number: gh pr view --json number -q .number
            2. Parse owner and repo from the GITHUB_REPOSITORY environment variable.
            3. Fetch open threads via gh api graphql, passing owner, repo, and
               number as -f variables so no user-controlled data is
               shell-interpolated.
            4. For each unresolved thread, read its comment body, check whether
               the current code addresses the issue, and if so resolve it via
               the resolveReviewThread GraphQL mutation.
            Only resolve threads where the fix is clearly present — leave
            threads open if the issue is partially addressed or still present.

            After resolving threads, if no new issues remain and all
            previously-raised threads are now resolved, submit an approval:
              gh pr review --approve --body "All issues resolved."
            If any threads remain open or you found new issues, do not approve —
            post a summary comment instead describing what's outstanding.
