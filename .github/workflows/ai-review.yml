name: AI Code Review

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    name: Claude Review
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # Opt out of automated review for a specific push by putting [skip-review]
      # (or [skip review]) in the tip commit message — used when merging an
      # already-approved PR and a re-review would only churn nits. The
      # pull_request event payload does not carry the head commit message, so we
      # read it via the API rather than from the checked-out tree (keeps the
      # reviewer's checkout untouched). HEAD_SHA is passed via env, never
      # interpolated into the shell, per .claude/rules/security.md.
      - name: Check for review opt-out
        id: optout
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Fail open: if the commit can't be read (transient error, fork PR
          # head not resolvable from base repo), msg is empty and review runs.
          msg=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA" --jq '.commit.message' 2>/dev/null || true)
          if printf '%s' "$msg" | grep -qiE '\[skip[ -]review\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Review opt-out keyword found in tip commit; skipping automated review."
          fi

      # The review protocol (tiering, scale calibration, thread resolution,
      # approval contract) lives in .github/ai-review-protocol.md so the
      # pull_request reviewer and the @claude re-review handler share one source
      # of truth. Each job prepends only its own intro, then concatenates the
      # shared protocol into the prompt. INTRO is a trusted, static string and
      # the protocol is a checked-in file — no untrusted event payload is
      # interpolated into any run: block, per .claude/rules/security.md.
      - name: Build review prompt
        id: review_prompt
        if: |
          (github.event_name == 'pull_request' && steps.optout.outputs.skip != 'true')
          || github.event_name == 'workflow_dispatch'
        env:
          INTRO: |
            Review this pull request for code quality, correctness, security, and adherence to
            project conventions (see CLAUDE.md and .claude/rules/). Focus on:
            - Bugs or logic errors
            - Security issues (SQL injection, path traversal, hardcoded secrets)
            - Violations of project standards (type hints, docstrings, error handling, sign conventions)
            - Test coverage gaps for new business logic

            Your complete, mandatory review protocol follows.
        run: |
          {
            echo 'text<<PROMPT_EOF'
            printf '%s\n\n' "$INTRO"
            cat .github/ai-review-protocol.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Automated PR review
        if: |
          (github.event_name == 'pull_request' && steps.optout.outputs.skip != 'true')
          || github.event_name == 'workflow_dispatch'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Grep,Glob"
          prompt: ${{ steps.review_prompt.outputs.text }}

      - name: Build mention prompt
        id: mention_prompt
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
        env:
          INTRO: |
            Respond to the @claude mention in the PR comment. If the request is
            a re-review (or otherwise asks you to re-evaluate the PR), inspect
            the current code against previously-raised review threads and any
            new concerns, using project conventions in CLAUDE.md and
            .claude/rules/.

            Apply the review protocol below to any new findings and to your verdict.
        run: |
          {
            echo 'text<<PROMPT_EOF'
            printf '%s\n\n' "$INTRO"
            cat .github/ai-review-protocol.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Interactive @claude mentions
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Grep,Glob"
          prompt: ${{ steps.mention_prompt.outputs.text }}
