name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so rapid pushes (common with agents)
# don't pile up behind stale runs. Mirrors scenarios.yml.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether any non-docs files changed. For pushes to main we always
  # run the full suite; for PRs we skip code jobs when only docs changed.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for non-docs changes
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1
            CHANGED=$(git diff --name-only "origin/$BASE_REF" HEAD)
            echo "Changed files:"
            echo "$CHANGED"
            if echo "$CHANGED" | grep -qvE '^(docs/|CHANGELOG\.md|README\.md)'; then
              echo "code=true" >> $GITHUB_OUTPUT
            else
              echo "code=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "code=true" >> $GITHUB_OUTPUT
          fi

  checks:
    name: Checks
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

  # Test jobs select by marker across the whole tests/ tree, not by
  # directory. Every test ends up with exactly one of
  # {unit, integration, e2e, scenarios} — the root conftest auto-applies
  # `unit` when no category marker is present and errors on conflicts,
  # so each job can use a plain `-m <category>` selection.
  test-unit:
    name: Unit tests (shard ${{ matrix.group }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel sibling shards on one failure — surface every failing
      # test across the suite in a single run, not just the first shard's.
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> $GITHUB_PATH

      # pytest-split shards the unit suite across the matrix so wall-clock
      # scales with the number of free standard runners. strategy.job-total is
      # the matrix size, so --splits stays in lockstep with the `group` array.
      # Each shard writes its own coverage data file; the `coverage` job below
      # combines them into a single report.
      - name: Test
        env:
          COVERAGE_FILE: .coverage.${{ matrix.group }}
          # sys.monitoring-based coverage (PEP 669) on Python 3.12 — far lower
          # tracing overhead than the default C tracer. Needs coverage >= 7.4.
          COVERAGE_CORE: sysmon
        run: |
          uv run pytest tests/ -m unit -v \
            --splits ${{ strategy.job-total }} --group ${{ matrix.group }} \
            --cov=src --cov-report= --durations=25

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-data-${{ matrix.group }}
          path: .coverage.${{ matrix.group }}
          include-hidden-files: true

  # Combine the per-shard coverage data into one report. Runs even when a
  # shard failed, so partial coverage still lands; waits on every shard.
  coverage:
    name: Coverage report
    needs: [changes, test-unit]
    if: ${{ always() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Download coverage data
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine and report
        run: |
          uv run coverage combine
          uv run coverage xml
          uv run coverage report

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage.xml

  test-integration:
    name: Integration tests
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> $GITHUB_PATH

      - name: Test
        run: uv run pytest tests/ -m integration -v --durations=25

  test-e2e:
    name: E2E tests (shard ${{ matrix.group }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2]
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> $GITHUB_PATH

      # Shard the e2e suite with pytest-split, same pattern as test-unit.
      # 2-way is enough: overall PR time is floored by the ~5 min Scenarios
      # workflow, so halving e2e (~6 min -> ~3 min) already clears it. Count-
      # based split is fine -- e2e tests are uniform and this job no longer
      # gates the critical path. No coverage here, so no combine job.
      - name: Test
        run: |
          uv run pytest tests/ -m e2e -v \
            --splits ${{ strategy.job-total }} --group ${{ matrix.group }} \
            --durations=25
