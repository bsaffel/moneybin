# External models: tables created by Python loaders or the app layer,
# not managed by SQLMesh.
# These must exist in the database before running `sqlmesh plan`.
# Run `moneybin schema init` or import data to create them.

- name: '"moneybin"."raw"."ofx_accounts"'
  columns:
    account_id: VARCHAR
    routing_number: VARCHAR
    account_type: VARCHAR
    institution_org: VARCHAR
    institution_fid: VARCHAR
    source_file: VARCHAR
    extracted_at: TIMESTAMP
    loaded_at: TIMESTAMP

- name: '"moneybin"."raw"."ofx_transactions"'
  columns:
    transaction_id: VARCHAR
    account_id: VARCHAR
    transaction_type: VARCHAR
    date_posted: TIMESTAMP
    amount: DECIMAL(18, 2)
    payee: VARCHAR
    memo: VARCHAR
    check_number: VARCHAR
    source_file: VARCHAR
    extracted_at: TIMESTAMP
    loaded_at: TIMESTAMP

- name: '"moneybin"."raw"."ofx_balances"'
  columns:
    account_id: VARCHAR
    statement_start_date: TIMESTAMP
    statement_end_date: TIMESTAMP
    ledger_balance: DECIMAL(18, 2)
    ledger_balance_date: TIMESTAMP
    available_balance: DECIMAL(18, 2)
    source_file: VARCHAR
    extracted_at: TIMESTAMP
    loaded_at: TIMESTAMP

- name: '"moneybin"."raw"."ofx_institutions"'
  columns:
    organization: VARCHAR
    fid: VARCHAR
    source_file: VARCHAR
    extracted_at: TIMESTAMP
    loaded_at: TIMESTAMP

- name: '"moneybin"."raw"."csv_accounts"'
  columns:
    account_id: VARCHAR
    account_type: VARCHAR
    institution_name: VARCHAR
    source_file: VARCHAR
    extracted_at: TIMESTAMP
    loaded_at: TIMESTAMP

- name: '"moneybin"."raw"."csv_transactions"'
  columns:
    transaction_id: VARCHAR
    account_id: VARCHAR
    transaction_date: DATE
    post_date: DATE
    amount: DECIMAL(18, 2)
    description: VARCHAR
    memo: VARCHAR
    category: VARCHAR
    subcategory: VARCHAR
    transaction_type: VARCHAR
    transaction_status: VARCHAR
    check_number: VARCHAR
    reference_number: VARCHAR
    balance: DECIMAL(18, 2)
    member_name: VARCHAR
    source_file: VARCHAR
    extracted_at: TIMESTAMP
    loaded_at: TIMESTAMP

# App layer: tables managed by MCP tools and CLI, not by SQLMesh.
# Referenced by core views for category enrichment.

- name: '"moneybin"."app"."transaction_categories"'
  columns:
    transaction_id: VARCHAR
    category: VARCHAR
    subcategory: VARCHAR
    categorized_at: TIMESTAMP
    categorized_by: VARCHAR
    merchant_id: VARCHAR
    confidence: DECIMAL(3, 2)
    rule_id: VARCHAR

- name: '"moneybin"."app"."merchants"'
  columns:
    merchant_id: VARCHAR
    raw_pattern: VARCHAR
    match_type: VARCHAR
    canonical_name: VARCHAR
    category: VARCHAR
    subcategory: VARCHAR
    created_by: VARCHAR
    created_at: TIMESTAMP
    updated_at: TIMESTAMP

# SQLMesh internal state — snapshot metadata. Wrapped by meta.model_freshness
# to expose a stable public contract for model-level freshness.

- name: '"moneybin"."sqlmesh"."_snapshots"'
  columns:
    name: VARCHAR
    identifier: VARCHAR
    version: VARCHAR
    dev_version: VARCHAR
    snapshot: BLOB
    kind_name: VARCHAR
    updated_ts: BIGINT
    unpaused_ts: BIGINT
    ttl_ms: BIGINT
    unrestorable: BOOLEAN
    forward_only: BOOLEAN
    fingerprint: BLOB
