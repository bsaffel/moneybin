scenario: basic-full-pipeline
description: "End-to-end correctness for the basic persona; smoke for full pipeline"

setup:
  persona: basic
  seed: 42
  years: 1
  fixtures: []

# The trailing `transform` is intentional: `categorize` writes to
# `app.transaction_categories`, and `core.fct_transactions` (a SQLMesh model)
# LEFT JOINs that table for its `category` column. Re-running transform
# rematerializes fct_transactions so the assigned categories are visible to
# the categorization_accuracy evaluation.
pipeline:
  - generate
  - transform
  - match
  - seed_merchants
  - categorize
  - transform

assertions:
  - name: fk_account_id
    fn: assert_valid_foreign_keys
    args:
      child: core.fct_transactions
      column: account_id
      parent: core.dim_accounts
      parent_column: account_id
  - name: sign_convention
    fn: assert_sign_convention
  - name: no_duplicate_gold_records
    fn: assert_no_duplicates
    args:
      table: core.fct_transactions
      columns: [transaction_id]

evaluations:
  - name: categorization_accuracy
    fn: score_categorization
    threshold:
      metric: accuracy
      min: 0.70

gates:
  required_assertions: all
  required_evaluations: all
